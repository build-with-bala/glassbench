# nginx server block for the GlassBench static site.
server {
    listen       80;
    listen       [::]:80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Default doc is the overview.
    location = / {
        try_files /index.html =404;
    }

    # Serve files directly; allow extensionless requests to resolve to .html
    # (e.g. /leaderboard -> /leaderboard.html) and fall back to a 404.
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Long cache for the immutable stylesheet; HTML stays revalidated.
    location = /style.css {
        add_header Cache-Control "public, max-age=86400";
    }
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # Small hardening for a purely-static public site.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Quiet, conventional error handling.
    error_page 404 /index.html;
    gzip on;
    gzip_types text/plain text/css text/html application/javascript application/json image/svg+xml;
    gzip_min_length 512;
}
