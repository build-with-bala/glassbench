# Trigger a Coolify redeploy of the GlassBench static site on every push to the default
# branch. Coolify builds the Dockerfile in this repo and serves the nginx static site.
#
# This workflow does not build or push anything itself — it just pings Coolify's deploy
# webhook, which pulls the latest commit and rebuilds. Two secrets are required on the
# repo (Settings -> Secrets and variables -> Actions):
#   COOLIFY_APP_UUID  — the application UUID from the Coolify dashboard
#   COOLIFY_TOKEN     — a Coolify API token with deploy permission
name: deploy

on:
  push:
    branches: ["main"]
  # Allow a manual redeploy from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  redeploy:
    name: Trigger Coolify redeploy
    runs-on: ubuntu-latest
    steps:
      - name: Call Coolify deploy webhook
        run: |
          curl -fsS -X GET \
            "http://160.250.205.81:8000/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}&force=true" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
